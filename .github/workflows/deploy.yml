name: Deploy

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Deploy to VPS
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.HOST }}
      username: ${{ secrets.USER }}
      key: ${{ secrets.SSH_KEY }}
      script: |
        cd /root/eldurato

        echo "Checking .env..."
        ls -la .env
        grep -E 'SITE_URL|SITE_NAME|ASSETS_URL' .env || true

        git pull origin main

        docker compose down
        docker compose up -d --build

        echo "Container environment:"
        docker exec ecommerce_app env | grep SITE || true

        docker image prune -f
