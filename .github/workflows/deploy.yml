name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 10m           # Ab lambe timeout ki zaroorat nahi hai
          command_timeout: 5m    # Har command max 5 mins mein khatam ho jayegi
          script: |
            # 1. FIXED PATH: Sahi project directory mein jayein
            cd /var/www/eldurato || { echo "ERROR: Directory /var/www/eldurato nahi mili!"; exit 1; }

            # 2. Check karein ki VPS par .env file maujood hai ya nahi
            echo "=== VPS Pe .env File Check ==="
            if [ -f .env ]; then
              echo ".env file exists on host."
              ls -la .env
              echo "Variables present in host .env:"
              grep -E 'SITE_URL|SITE_NAME|ASSETS_URL|DB_NAME' .env || true
            else
              echo "ERROR: .env file is MISSING on VPS host!"
              exit 1
            fi

            # 3. Git pull se pehle local conflicts se bachne ke liye stash karein
            echo "=== Fetching Latest Code ==="
            git stash
            git pull origin main

            # 4. Containers ko sirf start/up karein (Bina bekar rebuild jhanjhat ke)
            echo "=== Docker Compose Up (Instant) ==="
            docker compose up -d

            # 5. Background mein dependencies check karein (agar composer.json badla ho)
            echo "=== Optimizing Composer Dependencies ==="
            docker exec ecommerce_app composer install --no-dev --optimize-autoloader || true

            # 6. Purani aur bekar images ko remove karein space bachane ke liye
            echo "=== Cleaning Up Old Docker Images ==="
            docker image prune -f
            
            echo "=== Deployment Completed Successfully in Seconds! ==="
