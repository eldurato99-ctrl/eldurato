name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. FIXED PATH: Sahi project directory mein jayein
            cd /var/www/eldurato || { echo "ERROR: Directory /var/www/eldurato nahi mili!"; exit 1; }

            # 2. Check karein ki VPS par .env file maujood hai ya nahi
            echo "=== VPS Pe .env File Check ==="
            if [ -f .env ]; then
              echo ".env file exists on host."
              ls -la .env
              echo "Variables present in host .env:"
              grep -E 'SITE_URL|SITE_NAME|ASSETS_URL|DB_NAME' .env || true
            else
              echo "ERROR: .env file is MISSING on VPS host!"
              exit 1
            fi

            # 3. Git pull se pehle local conflicts se bachne ke liye stash karein
            echo "=== Fetching Latest Code ==="
            git stash
            git pull origin main

            # 4. Rebuild containers (bina down kiye taki website band na ho)
            echo "=== Docker Compose Rebuild and Up ==="
            docker compose up -d --build

            # 5. Container ke andar environment variables check karne ke liye 5 second ka wait karein
            sleep 5

            echo "=== Container Ke Andar Ka Env Check ==="
            # PHP container ke environment ko check karne ke liye
            docker exec ecommerce_app env | grep -E 'SITE|URL|NAME|DB_' || echo "No matching env variables found inside container."

            # 6. Purani aur bekar images ko remove karein space bachane ke liye
            docker image prune -f
