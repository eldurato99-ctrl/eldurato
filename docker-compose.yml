services:
  app:
    build: .
    container_name: ecommerce_app
    ports:
      - "8000:80"
    restart: always
    depends_on:
      - db

    env_file:
      - .env

    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor 

  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: always

    env_file:
      - .env

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
